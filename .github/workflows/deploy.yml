name: Deploy rp-schliesstechnik

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/rp-schliesstechnik-staging
            [ -f components/data/viewCount.json ] && cp components/data/viewCount.json /tmp/viewCount-staging.bak
            git fetch origin
            git reset --hard origin/dev
            mkdir -p components/data
            if [ -f /tmp/viewCount-staging.bak ]; then
              mv /tmp/viewCount-staging.bak components/data/viewCount.json
            else
              echo '{"count":0,"lastVisit":null,"buttonClicks":{"stickyCall":{"count":0,"lastClick":null},"navigationCall":{"count":0,"lastClick":null},"productCall":{"count":0,"lastClick":null}}}' > components/data/viewCount.json
            fi
            npm ci --omit=dev
            npm run build
            pm2 restart rp-schliesstechnik-staging || pm2 start /root/rp-schliesstechnik/ecosystem.config.js --only rp-schliesstechnik-staging
            pm2 save

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/rp-schliesstechnik
            [ -f components/data/viewCount.json ] && cp components/data/viewCount.json /tmp/viewCount-prod.bak
            git fetch origin
            git pull --ff-only origin main
            mkdir -p components/data
            if [ -f /tmp/viewCount-prod.bak ]; then
              mv /tmp/viewCount-prod.bak components/data/viewCount.json
            else
              echo '{"count":0,"lastVisit":null,"buttonClicks":{"stickyCall":{"count":0,"lastClick":null},"navigationCall":{"count":0,"lastClick":null},"productCall":{"count":0,"lastClick":null}}}' > components/data/viewCount.json
            fi
            npm ci --omit=dev
            npm run build
            pm2 restart rp-schliesstechnik || pm2 start ecosystem.config.js --only rp-schliesstechnik
            pm2 save
